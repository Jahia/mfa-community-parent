# default configuration - won't be overridden
# WebAuthn MFA factor module configuration. The marker line above tells Jahia's module extender
# NOT to overwrite the deployed <karaf>/etc/org.jahia.modules.webauthn.cfg on restart, so
# operator edits survive; the component re-reads them live (on @Modified).

# --- Relying Party (WebAuthnConfig) --------------------------------------------
# WebAuthn credentials are bound to a Relying Party ID (an effective domain) and validated
# against a set of allowed origins. These MUST match the domain the browser is actually on.
# WebAuthn also requires a secure context (HTTPS) — except on http://localhost.

# The Relying Party ID: a registrable suffix of the browsing origin's host.
#   - local test stack:  localhost
#   - production:        example.com   (NOT https://example.com — host only, no scheme/port)
rpId=localhost

# Human-readable site name shown by the authenticator during registration.
rpName=Jahia

# Allowed full origins (scheme://host[:port]), comma-separated via indexed keys. Leave unset to
# let the library derive the origin from the RP ID. Set this when the browsing origin's port or
# scheme must be pinned, e.g.:
#   origins.0=https://example.com
#   origins.1=http://localhost:8080
